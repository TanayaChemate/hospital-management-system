name: CI/CD PHP App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t hospital-app

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Image
      run: docker tag hospital-app ${{ secrets.DOCKER_USERNAME }}/hospital-app

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/hospital-app